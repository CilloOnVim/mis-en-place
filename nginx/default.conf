server {
    listen 80;
    root /usr/share/nginx/html;

    # Serve frontend HTML on root
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Route 1: Traffic to /api/auth goes to the Auth Service
    location /api/auth/ {
        # Rewrite URL: /api/auth/login.php -> /login.php
        rewrite ^/api/auth/(.*) /$1 break;
        proxy_pass http://auth:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Route 2: Traffic to /api/profile goes to the Profile Service
    location /api/profile/ {
        rewrite ^/api/profile/(.*) /$1 break;
        proxy_pass http://profile:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Route 3: Traffic to /api/posts goes to the Post Service
    location /api/posts/ {
        rewrite ^/api/posts/(.*) /$1 break;
        proxy_pass http://post:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}